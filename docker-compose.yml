services:
  postgres:
    image: postgres:16-alpine
    container_name: gymx-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: gymx_user
      POSTGRES_PASSWORD: gymx_dev_password
      POSTGRES_DB: gymx

    ports:
      - "5432:5432"

    volumes:
      - gymx_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymx_user -d gymx"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gymx_postgres_data: